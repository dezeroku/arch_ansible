---
- name: Install fuzzel
  become: true
  become_user: root
  community.general.pacman:
    name:
      - fuzzel
    state: present

- name: Ensure directory exists
  ansible.builtin.file:
    path: ~/.config/fuzzel
    state: directory
    mode: 0755

- name: Template fuzzel config
  ansible.builtin.template:
    src: fuzzel.ini
    dest: ~/.config/fuzzel/fuzzel.ini
    mode: 0644
